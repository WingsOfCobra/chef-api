name: Deploy to SOLCloud

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            # Pull latest docker-compose.yml from repo
            curl -fsSL https://raw.githubusercontent.com/WingsOfCobra/chef-api/main/docker-compose.yml -o docker-compose.yml.new
            mv docker-compose.yml.new docker-compose.yml
            # Deploy
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f

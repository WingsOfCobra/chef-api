services:
  chef-api:
    image: ghcr.io/wingsofcobra/chef-api:latest
    container_name: chef-api
    ports:
      - "${BIND_ADDR:-127.0.0.1}:4242:4242"
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_PATH:-/tmp/workspace}:/workspace:ro
    networks:
      - chef-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4242/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  chef-network:
    name: chef-network
    driver: bridge
